name: Build Sypcoin

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build -p node -p sypcoin-cli --release --features storage/rocksdb-backend

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: sypcoin-linux-x86
          path: |
            target/release/sypcoin
            target/release/sypcoin-cli
